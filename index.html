<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>العيسائي برو - النظام الموحد</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4cc9f0">
    
    <!-- CSS: الثيمات والحركات -->
    <link rel="stylesheet" href="assets/css/themes.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    
    <!-- أنماط مخصصة -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-main, linear-gradient(135deg, #1a1a2e, #16213e, #0f3460));
            color: var(--text-primary, #ffffff);
            user-select: none;
        }

        #status-bar {
            height: 40px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid var(--border-light, rgba(255,255,255,0.1));
            z-index: 100;
        }

        #sync-indicator {
            color: var(--danger, #f72585);
            transition: 0.5s;
            margin-left: 8px;
        }
        #sync-indicator.online { color: var(--success, #4ade80); text-shadow: 0 0 10px var(--success); }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 25px;
            padding: 30px;
            height: calc(100vh - 100px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--primary, #4cc9f0) var(--bg-secondary, #16213e);
        }

        .grid-container::-webkit-scrollbar {
            width: 6px;
        }
        .grid-container::-webkit-scrollbar-thumb {
            background: var(--primary, #4cc9f0);
            border-radius: 10px;
        }

        .app-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            position: relative;
        }
        .app-card:active { transform: scale(0.9); }
        .app-card[draggable="true"] { cursor: grab; }
        .app-card:active { cursor: grabbing; }
        .app-card.drag-over { border: 2px dashed var(--primary, #4cc9f0); transform: scale(1.1); border-radius: 12px; }

        .icon-box {
            width: 65px;
            height: 65px;
            background: var(--bg-card, rgba(255,255,255,0.05));
            border-radius: 16px;
            border: 1px solid var(--border-light, rgba(255,255,255,0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            box-shadow: var(--shadow-md, 0 4px 8px rgba(0,0,0,0.4));
            backdrop-filter: blur(5px);
        }

        .app-name {
            margin-top: 8px;
            font-size: 0.85rem;
            text-align: center;
            font-weight: 500;
            color: var(--text-primary, #ffffff);
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* لوحة الإدارة */
        .admin-panel, .admin-ui {
            background: var(--bg-secondary, #16213e);
            color: var(--text-primary, #ffffff);
            padding: 20px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            direction: rtl;
        }

        .admin-item, .admin-row {
            display: flex;
            align-items: center;
            background: var(--bg-card, rgba(255,255,255,0.05));
            margin: 10px 0;
            padding: 12px;
            border-radius: 12px;
            gap: 10px;
            border: 1px solid var(--border-light, rgba(255,255,255,0.1));
        }

        .btn-save-mini { background: var(--primary, #4cc9f0); border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; color: white; }
        .btn-save-mini.saved { background: var(--success, #4ade80); }
        
        .adm-btn {
            background: rgba(76, 201, 240, 0.2);
            border: 1px solid var(--primary, #4cc9f0);
            color: var(--text-primary, #ffffff);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            margin: 2px;
        }
        .adm-btn:hover {
            background: var(--primary, #4cc9f0);
            color: black;
        }

        .hidden { display: none !important; }

        /* نافذة المسرح */
        #stage-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .window-frame {
            width: 95%;
            height: 90%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            color: #333;
            display: flex;
            flex-direction: column;
        }
        .window-toolbar {
            background: #222;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-btn {
            background: var(--danger, #f72585);
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            padding: 5px 10px;
        }
        #stage-viewport {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
        }

        #digital-clock {
            font-family: monospace;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .brand-name {
            font-weight: bold;
            margin-right: 10px;
        }

        #admin-view {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            min-height: 250px;
            color: var(--text-primary, #ffffff);
        }

        #admin-view input, #admin-view textarea {
            background: rgba(255,255,255,0.9);
            border: 1px solid var(--primary, #4cc9f0);
            border-radius: 5px;
            padding: 5px;
            color: #333;
        }

        .code-editor {
            width: 100%;
            min-height: 300px;
            background: #282a36;
            color: #f8f8f2;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 15px;
            border: 2px solid var(--primary, #4cc9f0);
            border-radius: 10px;
            direction: ltr;
            text-align: left;
            white-space: pre;
            overflow-x: auto;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .file-item:hover {
            background: rgba(76,201,240,0.2);
            transform: translateX(-5px);
        }

        .file-actions {
            display: flex;
            gap: 5px;
        }

        .file-btn {
            background: none;
            border: 1px solid var(--primary, #4cc9f0);
            color: var(--text-primary, #ffffff);
            padding: 3px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        .file-btn:hover {
            background: var(--primary, #4cc9f0);
            color: black;
        }

        .file-btn.delete:hover {
            background: var(--danger, #f72585);
            border-color: var(--danger);
        }

        .isolated-lab {
            background: #1a1a2e;
            border: 2px dashed var(--primary, #4cc9f0);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .lab-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: var(--primary, #4cc9f0);
        }

        .lab-content {
            background: white;
            border-radius: 8px;
            padding: 15px;
            min-height: 200px;
            color: #333;
        }
    </style>
</head>
<body class="theme-dark" data-theme="dark">

<div id="os-root">
    <header id="status-bar">
        <div class="right-section">
            <span id="sync-indicator">●</span>
            <span class="brand-name">AL-AISAI PRO</span>
        </div>
        <div id="digital-clock">00:00</div>
        <div class="left-section">
            <div id="admin-gate" onclick="Admin.requestAccess()" style="cursor:pointer; font-size:1.5rem;">⚙️</div>
        </div>

    <main id="desktop">
        <div id="app-grid" class="grid-container"></div>
    </main>

    <div id="stage-overlay" class="hidden">
        <div class="window-frame">
            <nav class="window-toolbar">
                <span id="active-app-title">النظام</span>
                <button onclick="AlaisaiOS.closeStage()" class="close-btn">✖ إغلاق</button>
            </nav>
            <div id="stage-viewport"></div>
        </div>
    </div>
</div>

<!-- تحميل نواة النظام والوحدات المحسنة (ترتيب مهم) -->
<!-- أولاً: النواة -->
<script src="system/core/core.js"></script>
<!-- ثانياً: قاعدة البيانات والأمان -->
<script src="system/core/database.js"></script>

<script src="system/ui/i18n.js"></script>

<script src="system/ui/ui-kit.js"></script>
<script src="system/ui/components.js"></script>

<!-- خامساً: المساعدات -->

<!-- ===== طبقة التوافق مع النظام القديم مع إضافة المزامنة السحابية والمخزن المحسّن ===== -->
<script>
    (function() {
        // تعريف AlaisaiOS إذا لم يكن موجوداً
        window.AlaisaiOS = window.AlaisaiOS || {
            db: {
                config: { pass: "1234", downloads: 0, reports: [] },
                registry: []
            },
            init: function() {
                console.log('AlaisaiOS legacy init');
                this.renderDesktop();
                this.startClock();
                this.checkNetwork();
                this.registerServiceWorker();
            },
            renderDesktop: function() {
                const grid = document.getElementById('app-grid');
                if (!grid) return;
                grid.innerHTML = "";
                const sorted = [...this.db.registry].sort((a,b) => (a.order||0) - (b.order||0));
                sorted.forEach((app, i) => {
                    const card = document.createElement('div');
                    card.className = "app-card";
                    card.setAttribute('draggable', 'true');
                    card.innerHTML = `<div class="icon-box">${app.icon}</div><span class="app-name">${app.name}</span>`;
                    
                    card.ondragstart = (e) => {
                        e.dataTransfer.setData('text/plain', i);
                        this.dragIdx = i;
                        e.target.style.opacity = '0.5';
                    };
                    card.ondragend = (e) => { e.target.style.opacity = '1'; };
                    card.ondragover = (e) => e.preventDefault();
                    card.ondrop = (e) => {
                        e.preventDefault();
                        const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
                        const toIdx = i;
                        if (fromIdx === toIdx) return;
                        const items = [...this.db.registry].sort((a,b) => (a.order||0) - (b.order||0));
                        const [moved] = items.splice(fromIdx, 1);
                        items.splice(toIdx, 0, moved);
                        this.db.registry = items.map((item, idx) => { item.order = idx; return item; });
                        this.save();
                        this.renderDesktop();
                    };
                    card.onclick = () => this.openApp(app);
                    grid.appendChild(card);
                });
            },
            openApp: function(app) {
                const stage = document.getElementById('stage-overlay');
                const viewport = document.getElementById('stage-viewport');
                document.getElementById('active-app-title').innerText = app.name;
                viewport.innerHTML = `<div style="height:100%;">${app.content}</div>`;
                stage.classList.remove('hidden');
            },
            closeStage: function() {
                document.getElementById('stage-overlay').classList.add('hidden');
                document.getElementById('stage-viewport').innerHTML = "";
            },
            startClock: function() {
                const update = () => {
                    const now = new Date();
                    document.getElementById('digital-clock').innerText = now.toLocaleTimeString('ar-SA', { hour:'2-digit', minute:'2-digit' });
                };
                update();
                setInterval(update, 1000);
            },
            checkNetwork: function() {
                const dot = document.getElementById('sync-indicator');
                if (dot) {
                    dot.style.color = navigator.onLine ? "#4ade80" : "#f72585";
                }
            },
            registerServiceWorker: function() {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('./sw.js').catch(console.log);
                }
            },
            save: function() {
                localStorage.setItem('alaisai_ultra_db', JSON.stringify(this.db));
            },
            // المخزن المعزول الجديد مع أيقونة الرادار فقط للمستودع
            StorageSystem: window.AlaisaiFileManager ? {
                openRepoExplorer: () => AlaisaiFileManager.openUI('', 'github'),
                openStorageExplorer: () => {
                    const content = `
                        <div class="admin-ui">
                            <h3>📡 مستكشف المستودع</h3>
                            <div style="display:flex; gap:20px; justify-content:center; margin:30px 0;">
                                <div style="text-align:center; cursor:pointer;" onclick="AlaisaiOS.StorageSystem.openRepoExplorer()">
                                    <div style="font-size:4rem;">📡</div>
                                    <h4>مستكشف المستودع</h4>
                                    <p style="font-size:12px;">GitHub / WebDAV</p>
                                </div>
                            </div>
                            <p style="color:#4cc9f0; font-size:12px;">يمكنك الاتصال بأي مستودع GitHub أو تخزين WebDAV</p>
                        </div>
                    `;
                    AlaisaiOS.openApp({ name: 'مستكشف المستودع', content });
                }
            } : {
                openRepoExplorer: () => alert('مدير الملفات غير متاح'),
                openStorageExplorer: () => alert('مدير الملفات غير متاح')
            }
        };

        // تحميل البيانات القديمة
        try {
            const saved = localStorage.getItem('alaisai_ultra_db');
            if (saved) {
                AlaisaiOS.db = JSON.parse(saved);
            } else {
                // بيانات افتراضية
                AlaisaiOS.db = {
                    config: { pass: "1234", downloads: 1050, reports: [] },
                    registry: [
                        { id: 'app_1', name: 'الترحيب', icon: '✨', content: '<div style="padding:20px;text-align:center;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:15px;color:white;"><h1>أهلاً بك</h1><p>نظام العيسائي الاحترافي جاهز للعمل.</p><button onclick="alert(\'مرحباً!\')" style="padding:10px 20px;border:none;border-radius:8px;background:#4ade80;color:white;cursor:pointer;">انقر هنا</button></div>', order: 0 },
                        { id: 'app_2', name: 'المتصفح', icon: '🌐', content: '<iframe sandbox="allow-scripts allow-same-origin allow-forms" src="https://www.bing.com" style="width:100%;height:100vh;border:none;"></iframe>', order: 1 },
                        { id: 'app_3', name: 'الملاحظات', icon: '📝', content: '<div style="padding:20px;"><h2>📋 دفتر الملاحظات</h2><textarea id="note-area" style="width:100%;height:300px;padding:15px;border-radius:10px;border:1px solid #ccc;font-size:16px;" placeholder="اكتب ملاحظاتك هنا..."></textarea><button onclick="localStorage.setItem(\'saved_note\', document.getElementById(\'note-area\').value);alert(\'تم الحفظ!\')" style="margin-top:10px;padding:10px 20px;background:#4cc9f0;border:none;border-radius:8px;color:white;">💾 حفظ</button></div>', order: 2 }
                    ]
                };
            }
        } catch (e) {
            console.warn('Failed to load legacy DB', e);
        }

        // ========== نظام المزامنة السحابية المحترف (يدمج كلاً من AlaisaiOS.db.registry و AlaisaiAddons) ==========
        const CloudSync = {
            status: function(msg, isError = false) {
                const el = document.getElementById('sync-status');
                if (el) el.innerHTML = msg;
                if (isError) console.error(msg);
                else console.log(msg);
            },

            upload: async function() {
                const provider = document.getElementById('cloud-provider')?.value;
                if (!provider) return;
                this.status('⏳ جاري رفع التطبيقات والإضافات...');
                
                if (provider === 'github') {
                    await this.uploadToGitHub();
                } else if (provider === 'webdav') {
                    await this.uploadToWebDAV();
                } else {
                    this.status('❌ هذا المزود غير مدعوم بعد', true);
                }
            },

            download: async function() {
                const provider = document.getElementById('cloud-provider')?.value;
                if (!provider) return;
                this.status('⏳ جاري سحب التطبيقات والإضافات...');
                
                if (provider === 'github') {
                    await this.downloadFromGitHub();
                } else if (provider === 'webdav') {
                    await this.downloadFromWebDAV();
                } else {
                    this.status('❌ هذا المزود غير مدعوم بعد', true);
                }
            },

            // جمع جميع العناصر (من AlaisaiOS.db.registry و AlaisaiAddons) مع تجنب التكرار
            getAllItems: function() {
                const items = [];
                const seenIds = new Set();

                // إضافة من registry القديم
                if (AlaisaiOS.db.registry) {
                    AlaisaiOS.db.registry.forEach(app => {
                        const id = app.id || `app_${Date.now()}_${Math.random()}`;
                        if (!seenIds.has(id)) {
                            seenIds.add(id);
                            items.push({
                                id: id,
                                name: app.name || 'تطبيق',
                                icon: app.icon || '📦',
                                content: app.content || '',
                                version: '1.0.0',
                                author: 'المالك',
                                script: '',
                                styles: '',
                                source: 'registry'
                            });
                        }
                    });
                }

                // إضافة من AlaisaiAddons (إذا كان موجوداً)
                if (window.AlaisaiAddons && typeof AlaisaiAddons.listAddons === 'function') {
                    const addons = AlaisaiAddons.listAddons();
                    addons.forEach(addon => {
                        if (!seenIds.has(addon.id)) {
                            seenIds.add(addon.id);
                            items.push({
                                id: addon.id,
                                name: addon.name || 'إضافة',
                                icon: addon.icon || '📦',
                                content: addon.content || '',
                                version: addon.version || '1.0.0',
                                author: addon.author || 'غير معروف',
                                script: addon.script || '',
                                styles: addon.styles || '',
                                source: 'addons'
                            });
                        }
                    });
                }

                return items;
            },

            // إضافة عنصر إلى النظام (سواء registry أو addons) مع تجنب التكرار
            addItemToSystem: function(item) {
                // التأكد من عدم وجود تطبيق بنفس الاسم أو id في registry
                if (!AlaisaiOS.db.registry.find(a => a.id === item.id || a.name === item.name)) {
                    // إضافة إلى registry القديم (كبداية)
                    const newApp = {
                        id: item.id,
                        name: item.name,
                        icon: item.icon || '📦',
                        content: item.content || '',
                        order: AlaisaiOS.db.registry.length
                    };
                    AlaisaiOS.db.registry.push(newApp);
                }

                // إضافة إلى AlaisaiAddons إذا كان متاحاً
                if (window.AlaisaiAddons && typeof AlaisaiAddons.addAddon === 'function') {
                    // نستخدم try/catch لنتجنب أي خطأ
                    try {
                        AlaisaiAddons.addAddon(item).catch(() => {});
                    } catch (e) {}
                }
            },

            // ===== GitHub =====
            uploadToGitHub: async function() {
                const repo = document.getElementById('github-repo')?.value.trim();
                const token = document.getElementById('github-token')?.value.trim();
                const branch = document.getElementById('github-branch')?.value || 'main';
                if (!repo || !token) {
                    this.status('❌ الرجاء إدخال المستودع والتوكن', true);
                    return;
                }
                try {
                    if (!window.AlaisaiFileManager) {
                        this.status('❌ نظام إدارة الملفات غير متاح', true);
                        return;
                    }
                    
                    AlaisaiFileManager.setToken(token);
                    const items = this.getAllItems();
                    
                    if (items.length === 0) {
                        this.status('⚠️ لا توجد تطبيقات أو إضافات لرفعها');
                        return;
                    }
                    
                    let successCount = 0;
                    for (const item of items) {
                        const fileName = `addons/${item.id}.json`;
                        const content = JSON.stringify(item, null, 2);
                        const saved = await AlaisaiFileManager.saveGitHubFile(fileName, content, `رفع ${item.name}`);
                        if (saved) successCount++;
                    }
                    this.status(`✅ تم رفع ${successCount} عنصر بنجاح إلى GitHub`);
                } catch (e) {
                    this.status('❌ فشل الرفع: ' + e.message, true);
                }
            },

            downloadFromGitHub: async function() {
                const repo = document.getElementById('github-repo')?.value.trim();
                const token = document.getElementById('github-token')?.value.trim();
                const branch = document.getElementById('github-branch')?.value || 'main';
                if (!repo || !token) {
                    this.status('❌ الرجاء إدخال المستودع والتوكن', true);
                    return;
                }
                try {
                    if (!window.AlaisaiFileManager) {
                        this.status('❌ نظام إدارة الملفات غير متاح', true);
                        return;
                    }
                    
                    AlaisaiFileManager.setToken(token);
                    const files = await AlaisaiFileManager.listGitHubContents('addons');
                    let successCount = 0;
                    
                    for (const file of files) {
                        if (file.type === 'file' && file.name.endsWith('.json')) {
                            const fileData = await AlaisaiFileManager.getGitHubFileContent(file.path);
                            if (fileData) {
                                try {
                                    const item = JSON.parse(fileData.content);
                                    this.addItemToSystem(item);
                                    successCount++;
                                } catch (e) {
                                    console.warn('ملف غير صالح:', file.name);
                                }
                            }
                        }
                    }
                    
                    if (successCount > 0) {
                        AlaisaiOS.save();
                        AlaisaiOS.renderDesktop();
                        this.status(`✅ تم سحب ${successCount} عنصر بنجاح من GitHub`);
                    } else {
                        this.status('⚠️ لم يتم العثور على عناصر جديدة');
                    }
                } catch (e) {
                    this.status('❌ فشل السحب: ' + e.message, true);
                }
            },

            // ===== WebDAV =====
            uploadToWebDAV: async function() {
                const url = document.getElementById('webdav-url')?.value.trim();
                const user = document.getElementById('webdav-user')?.value.trim();
                const pass = document.getElementById('webdav-pass')?.value.trim();

                if (!url || !user || !pass) {
                    this.status('❌ الرجاء إدخال عنوان URL واسم المستخدم وكلمة المرور', true);
                    return;
                }

                const baseUrl = url.endsWith('/') ? url : url + '/';
                const items = this.getAllItems();

                if (items.length === 0) {
                    this.status('⚠️ لا توجد تطبيقات أو إضافات لرفعها');
                    return;
                }

                this.status(`⏳ جاري رفع ${items.length} عنصر إلى WebDAV...`);
                let successCount = 0;

                for (const item of items) {
                    const fileName = `${item.id}.json`;
                    const fileUrl = baseUrl + fileName;
                    const content = JSON.stringify(item, null, 2);

                    try {
                        const response = await fetch(fileUrl, {
                            method: 'PUT',
                            headers: {
                                'Authorization': 'Basic ' + btoa(user + ':' + pass),
                                'Content-Type': 'application/json',
                            },
                            body: content
                        });

                        if (response.ok) {
                            successCount++;
                        } else {
                            console.error(`❌ فشل رفع ${fileName}: ${response.status}`);
                        }
                    } catch (err) {
                        console.error(`❌ خطأ في رفع ${fileName}:`, err);
                    }
                }

                if (successCount > 0) {
                    this.status(`✅ تم رفع ${successCount} عنصر بنجاح إلى WebDAV`);
                } else {
                    this.status('❌ فشل رفع جميع العناصر. تحقق من الرابط والبيانات.', true);
                }
            },

            downloadFromWebDAV: async function() {
                const url = document.getElementById('webdav-url')?.value.trim();
                const user = document.getElementById('webdav-user')?.value.trim();
                const pass = document.getElementById('webdav-pass')?.value.trim();

                if (!url || !user || !pass) {
                    this.status('❌ الرجاء إدخال عنوان URL واسم المستخدم وكلمة المرور', true);
                    return;
                }

                const baseUrl = url.endsWith('/') ? url : url + '/';
                this.status('⏳ جاري جلب قائمة الملفات من WebDAV...');

                try {
                    const response = await fetch(baseUrl, {
                        method: 'PROPFIND',
                        headers: {
                            'Authorization': 'Basic ' + btoa(user + ':' + pass),
                            'Depth': '1'
                        }
                    });

                    if (!response.ok) throw new Error(`HTTP error ${response.status}`);

                    const text = await response.text();
                    const parser = new DOMParser();
                    const xml = parser.parseFromString(text, 'application/xml');
                    const responses = xml.querySelectorAll('response');

                    let successCount = 0;

                    for (const resp of responses) {
                        const href = resp.querySelector('href')?.textContent;
                        if (!href) continue;
                        const fileName = href.split('/').pop();
                        if (!fileName || fileName === '' || fileName.endsWith('/')) continue;
                        if (!fileName.endsWith('.json')) continue;

                        const fileUrl = baseUrl + fileName;
                        const fileResp = await fetch(fileUrl, {
                            headers: { 'Authorization': 'Basic ' + btoa(user + ':' + pass) }
                        });

                        if (fileResp.ok) {
                            const content = await fileResp.text();
                            try {
                                const item = JSON.parse(content);
                                this.addItemToSystem(item);
                                successCount++;
                            } catch (e) {
                                console.warn('ملف غير صالح:', fileName);
                            }
                        }
                    }

                    if (successCount > 0) {
                        AlaisaiOS.save();
                        AlaisaiOS.renderDesktop();
                        this.status(`✅ تم سحب ${successCount} عنصر بنجاح من WebDAV`);
                    } else {
                        this.status('⚠️ لم يتم العثور على عناصر JSON في WebDAV');
                    }
                } catch (err) {
                    console.error(err);
                    this.status('❌ فشل السحب من WebDAV: ' + err.message, true);
                }
            }
        };

        // Admin المحسّن مع إضافة زر استعادة آخر نسخة
        window.Admin = {
            requestAccess: function() {
                const p = prompt("🔐 وضع المصمم المالك: أدخل كلمة المرور");
                if (p === AlaisaiOS.db.config.pass) {
                    this.openDashboard();
                } else if (p !== null) {
                    alert("❌ كلمة مرور خاطئة!");
                }
            },
            openDashboard: function() {
                const content = `
                    <div class="admin-ui">
                        <h2 style="border-bottom:2px solid #4cc9f0; padding-bottom:10px;">🛠 لوحة التحكم المركزية</h2>
                        <div style="display:flex; gap:5px; margin-bottom:15px; flex-wrap:wrap;">
                            <button class="adm-btn" onclick="Admin.renderTab('layout')">📱 الواجهة</button>
                            <button class="adm-btn" onclick="Admin.renderTab('msg')">📩 المراسلة</button>
                            <button class="adm-btn" onclick="Admin.renderTab('sys')">⚙️ النظام</button>
                            <button class="adm-btn" onclick="Admin.renderTab('backup')">💾 النسخ الاحتياطي</button>
                            <button class="adm-btn" onclick="Admin.renderTab('storage')" style="background:#4cc9f0;">📡 مستكشف المستودع</button>
                            <button class="adm-btn" onclick="Admin.renderTab('cloud')" style="background:#4ade80;">☁️ المزامنة السحابية</button>
                        </div>
                        <div id="admin-view" style="background:rgba(255,255,255,0.1); padding:15px; border-radius:12px; min-height:250px;"></div>
                    </div>
                `;
                AlaisaiOS.openApp({ name: "إدارة النظام", content: content });
                setTimeout(() => this.renderTab('layout'), 100);
            },
            renderTab: function(tab) {
                const view = document.getElementById('admin-view');
                if (!view) return;
                
                if (tab === 'layout') {
                    let list = "<h4>📱 تعديل الأزرار (اسحب للترتيب):</h4>";
                    AlaisaiOS.db.registry.forEach((app, i) => {
                        list += `
                            <div class="admin-row" draggable="true" ondragstart="Admin.drag(${i})" ondrop="Admin.drop(${i})" ondragover="event.preventDefault()">
                                <input type="text" id="in_${app.id}" value="${app.name.replace(/"/g, '&quot;')}" style="width:80px; margin-left:5px;">
                                <button onclick="Admin.saveName('${app.id}')" id="sav_${app.id}" class="btn-save-mini">☑️</button>
                                <button onclick="Admin.editIcon('${app.id}')" style="margin:0 5px;background:rgba(76,201,240,0.2);border:none;border-radius:5px;padding:5px;">${app.icon}</button>
                                <button onclick="Admin.deleteApp('${app.id}')" style="background:#f72585; color:white; border:none; border-radius:4px; padding:5px 10px;">🗑</button>
                            </div>
                        `;
                    });
                    list += `<button onclick="Admin.addNew()" style="width:100%; margin-top:10px; background:#4ade80; border:none; padding:10px; border-radius:8px; color:white; font-weight:bold;">➕ إضافة تطبيق جديد</button>`;
                    view.innerHTML = list;
                }
                else if (tab === 'msg') {
                    view.innerHTML = `
                        <h4>📩 التقارير والمراسلة:</h4>
                        <p>إجمالي الزيارات: <b>${AlaisaiOS.db.config.downloads}</b></p>
                        <div style="max-height:150px; overflow-y:auto; background:rgba(255,255,255,0.2); padding:10px; border-radius:8px;">
                            ${(AlaisaiOS.db.config.reports || []).map(r => `
                                <div style="border-bottom:1px solid rgba(255,255,255,0.1); padding:5px 0;">
                                    <small>${r.email}</small> 
                                    <button onclick="Admin.copy('${r.email}')" class="btn-save-mini">نسخ</button>
                                    <p style="margin:5px 0;">${r.text}</p>
                                </div>
                            `).join('')}
                        </div>
                        <input type="email" id="reply_mail" placeholder="إيميل المستلم" style="width:100%; margin-top:10px; padding:8px;">
                        <textarea id="reply_msg" placeholder="اكتب ردك هنا..." style="width:100%; height:50px; margin-top:5px; padding:8px;"></textarea>
                        <button onclick="alert('✅ تم إرسال الرد بنجاح');" style="width:100%; background:#4cc9f0; border:none; color:white; padding:8px; margin-top:5px; border-radius:5px;">إرسال الرد</button>
                    `;
                }
                else if (tab === 'sys') {
                    view.innerHTML = `
                        <h4>⚙️ أدوات النظام المتقدمة:</h4>
                        <button class="adm-btn" onclick="Admin.changePass()">🔐 تغيير كلمة المرور</button>
                        <button class="adm-btn" onclick="Admin.exportData()">📥 تصدير النظام (Backup)</button>
                        <button class="adm-btn" onclick="Admin.importData()">📤 استيراد نسخة احتياطية</button>
                        <button class="adm-btn" onclick="Admin.resetSystem()">🔄 إعادة ضبط المصنع</button>
                    `;
                }
                else if (tab === 'backup') {
                    view.innerHTML = `
                        <h4>💾 النسخ الاحتياطي</h4>
                        <button class="adm-btn" onclick="Admin.exportData()">📥 نسخة يدوية</button>
                        <button class="adm-btn" onclick="Admin.restoreAutoBackup()" style="background:#4cc9f0;">🔄 استعادة آخر نسخة تلقائية</button>
                    `;
                }
                else if (tab === 'storage') {
                    view.innerHTML = `
                        <h4>📡 مستكشف المستودع</h4>
                        <div style="display:flex; gap:20px; justify-content:center; margin:20px 0;">
                            <div style="text-align:center; cursor:pointer;" onclick="AlaisaiOS.StorageSystem.openRepoExplorer()">
                                <div style="font-size:4rem;">📡</div>
                                <h5>مستكشف المستودع</h5>
                                <p style="font-size:12px;">GitHub / WebDAV</p>
                            </div>
                        </div>
                        <p style="color:#4cc9f0; font-size:12px;">يمكنك الاتصال بأي مستودع GitHub أو تخزين WebDAV</p>
                    `;
                }
                else if (tab === 'cloud') {
                    view.innerHTML = `
                        <h4>☁️ المزامنة السحابية</h4>
                        <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:10px;">
                            <p style="margin-bottom:10px;">اختر خدمة التخزين السحابي:</p>
                            <select id="cloud-provider" style="width:100%; padding:8px; margin-bottom:10px; border-radius:5px;">
                                <option value="github">GitHub (مستودع المشروع)</option>
                                <option value="webdav">WebDAV (Nextcloud, ownCloud)</option>
                            </select>
                            
                            <div id="github-settings">
                                <input type="text" id="github-repo" placeholder="المستودع (مثلاً: username/repo)" value="alsamayoanwww-cyber/Alaisai_OS_Pro" style="width:100%; padding:8px; margin-bottom:5px; border-radius:5px;">
                                <input type="text" id="github-token" placeholder="Personal Access Token" style="width:100%; padding:8px; margin-bottom:5px; border-radius:5px;">
                                <select id="github-branch" style="width:100%; padding:8px; margin-bottom:10px; border-radius:5px;">
                                    <option value="main">main</option>
                                    <option value="master">master</option>
                                </select>
                            </div>
                            
                            <div id="webdav-settings" style="display:none;">
                                <input type="text" id="webdav-url" placeholder="WebDAV URL" style="width:100%; padding:8px; margin-bottom:5px; border-radius:5px;">
                                <input type="text" id="webdav-user" placeholder="اسم المستخدم" style="width:100%; padding:8px; margin-bottom:5px; border-radius:5px;">
                                <input type="password" id="webdav-pass" placeholder="كلمة المرور" style="width:100%; padding:8px; margin-bottom:10px; border-radius:5px;">
                            </div>
                            
                            <div style="display:flex; gap:10px; margin-top:15px;">
                                <button class="adm-btn" onclick="Admin.cloudSync.upload()" style="background:#4ade80;">⬆️ رفع التطبيقات والإضافات</button>
                                <button class="adm-btn" onclick="Admin.cloudSync.download()" style="background:#4cc9f0;">⬇️ سحب التطبيقات والإضافات</button>
                            </div>
                            
                            <div id="sync-status" style="margin-top:15px; padding:10px; background:#1a1a2e; border-radius:5px; min-height:50px;">
                                الحالة: جاهز
                            </div>
                        </div>
                    `;
                    
                    document.getElementById('cloud-provider').onchange = function() {
                        document.getElementById('github-settings').style.display = this.value === 'github' ? 'block' : 'none';
                        document.getElementById('webdav-settings').style.display = this.value === 'webdav' ? 'block' : 'none';
                    };
                }
            },
            
            // دوال الإدارة
            saveName: function(id) {
                const app = AlaisaiOS.db.registry.find(a => a.id === id);
                if (app) {
                    app.name = document.getElementById('in_'+id).value;
                    AlaisaiOS.save();
                    AlaisaiOS.renderDesktop();
                }
            },
            editIcon: function(id) {
                const app = AlaisaiOS.db.registry.find(a => a.id === id);
                const icon = prompt("أدخل الأيقونة:", app.icon);
                if (icon) {
                    app.icon = icon;
                    AlaisaiOS.save();
                    AlaisaiOS.renderDesktop();
                    this.renderTab('layout');
                }
            },
            deleteApp: function(id) {
                if (confirm("حذف؟")) {
                    AlaisaiOS.db.registry = AlaisaiOS.db.registry.filter(a => a.id !== id);
                    AlaisaiOS.save();
                    AlaisaiOS.renderDesktop();
                    this.renderTab('layout');
                }
            },
            addNew: function() {
                const name = prompt("اسم التطبيق:");
                const code = prompt("كود HTML/JS:");
                if (name && code) {
                    AlaisaiOS.db.registry.push({
                        id: 'app_' + Date.now(),
                        name: name,
                        icon: '📦',
                        content: code,
                        order: AlaisaiOS.db.registry.length
                    });
                    AlaisaiOS.save();
                    AlaisaiOS.renderDesktop();
                    this.renderTab('layout');
                }
            },
            exportData: function() {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(AlaisaiOS.db, null, 2));
                const a = document.createElement('a');
                a.href = dataStr;
                a.download = `backup_${new Date().toISOString().slice(0,10)}.json`;
                a.click();
            },
            importData: function() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = e => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = e => {
                        try {
                            const content = JSON.parse(e.target.result);
                            if (content.registry) {
                                AlaisaiOS.db = content;
                                AlaisaiOS.save();
                                location.reload();
                            }
                        } catch (err) { alert('ملف غير صالح'); }
                    };
                    reader.readAsText(file);
                };
                input.click();
            },
            resetSystem: function() {
                if (confirm('إعادة ضبط؟')) {
                    localStorage.removeItem('alaisai_ultra_db');
                    location.reload();
                }
            },
            changePass: function() {
                const n = prompt("كلمة المرور الجديدة:");
                if (n) {
                    AlaisaiOS.db.config.pass = n;
                    AlaisaiOS.save();
                    alert("✅ تم التغيير");
                }
            },
            restoreAutoBackup: function() {
                try {
                    const backup = JSON.parse(localStorage.getItem('alaisai_auto_backup'));
                    if (backup && backup.data) {
                        AlaisaiOS.db = backup.data;
                        AlaisaiOS.save();
                        alert('✅ تم استعادة آخر نسخة احتياطية تلقائية');
                        location.reload();
                    } else {
                        alert('❌ لا توجد نسخة احتياطية صالحة');
                    }
                } catch (e) {
                    alert('❌ فشل استعادة النسخة');
                }
            },
            copy: function(t) {
                navigator.clipboard.writeText(t).then(() => alert("✅ تم النسخ!"));
            },
            drag: function(i) { this.adminDragIdx = i; },
            drop: function(target) {
                const items = AlaisaiOS.db.registry;
                if (this.adminDragIdx !== null && this.adminDragIdx !== target) {
                    const [moved] = items.splice(this.adminDragIdx, 1);
                    items.splice(target, 0, moved);
                    items.forEach((item, idx) => item.order = idx);
                    AlaisaiOS.save();
                    AlaisaiOS.renderDesktop();
                    this.renderTab('layout');
                }
            },
            cloudSync: CloudSync
        };

        // بدء التشغيل
        window.onload = () => AlaisaiOS.init();
    })();
</script>
